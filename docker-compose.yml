version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # These credentials are only used inside your local Docker network and
    # are never exposed publicly - safe to commit. Don't reuse them anywhere
    # real (like Neon/Render), where you'll use provider-generated credentials.
    environment:
      POSTGRES_USER: forgeml
      POSTGRES_PASSWORD: forgeml
      POSTGRES_DB: forgeml
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeml"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://forgeml:forgeml@db:5432/forgeml
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
  backend_storage:
